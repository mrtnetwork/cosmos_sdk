syntax = "proto3";
package common;

option go_package = "gitlab.com/thorchain/thornode/v3/common";
option (gogoproto.goproto_stringer_all) = false;
option (gogoproto.stringer_all) = false;
option (gogoproto.goproto_getters_all) = false;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

message Asset {
  string chain = 1 [ (gogoproto.casttype) = "Chain" ];
  string symbol = 2 [ (gogoproto.casttype) = "Symbol" ];
  string ticker = 3 [ (gogoproto.casttype) = "Ticker" ];
  bool synth = 4;
  bool trade = 5;
  bool secured = 6;
}

message Coin {
  Asset asset = 1 [
    (gogoproto.jsontag) = "asset",
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "Asset",
    (amino.encoding) = "asset"
  ];
  string amount = 2 [
    (gogoproto.jsontag) = "amount",
    (gogoproto.customtype) = "cosmossdk.io/math.Uint",
    (gogoproto.nullable) = false
  ];
  int64 decimals = 3;
}

// PubKeySet contains two pub keys , secp256k1 and ed25519
message PubKeySet {
  string secp256k1 = 1
      [ (gogoproto.casttype) = "PubKey", (gogoproto.customname) = "Secp256k1" ];
  string ed25519 = 2 [ (gogoproto.casttype) = "PubKey" ];
}

message Tx {
  string id = 1
      [ (gogoproto.casttype) = "TxID", (gogoproto.customname) = "ID" ];
  string chain = 2 [ (gogoproto.casttype) = "Chain" ];
  string from_address = 3 [ (gogoproto.casttype) = "Address" ];
  string to_address = 4 [ (gogoproto.casttype) = "Address" ];
  repeated Coin coins = 5 [
    (gogoproto.jsontag) = "coins",
    (gogoproto.castrepeated) = "Coins",
    (gogoproto.nullable) = false
  ];
  repeated Coin gas = 6 [
    (gogoproto.jsontag) = "gas",
    (gogoproto.castrepeated) = "Gas",
    (gogoproto.nullable) = false
  ];
  string memo = 7;
}

message Fee {
  repeated Coin coins = 1
      [ (gogoproto.castrepeated) = "Coins", (gogoproto.nullable) = false ];
  string pool_deduct = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Uint",
    (gogoproto.nullable) = false
  ];
}

message ProtoUint {
  option (gogoproto.stringer) = true;
  string value = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.Uint",
    (gogoproto.nullable) = false
  ];
}

enum Status {
  incomplete = 0;
  done = 1;
  reverted = 2;
}

message OutputRef {
  option (gogoproto.stringer) = true;

  string tx_hash = 1;
  uint32 output_index = 2;
  string key_image = 3;
  string spend_tx_hash = 4;
}

message ObservedTx {
  Tx tx = 1 [ (gogoproto.nullable) = false ];
  Status status = 2;
  repeated string out_hashes = 3;
  int64 block_height = 4;
  repeated string signers = 5;
  string observed_pub_key = 6 [ (gogoproto.casttype) = "PubKey" ];
  int64 keysign_ms = 7;
  int64 finalise_height = 8;
  string aggregator = 9;
  string aggregator_target = 10;
  string aggregator_target_limit = 11 [
    (gogoproto.customtype) = "cosmossdk.io/math.Uint",
    (gogoproto.nullable) = true
  ];
  repeated OutputRef spent_output_refs = 12 [ (gogoproto.nullable) = false ];
}

message Attestation {
  option (gogoproto.stringer) = true;

  bytes PubKey = 1;
  bytes Signature = 2;
}

message AttestTx {
  option (gogoproto.stringer) = true;

  ObservedTx obsTx = 1 [ (gogoproto.nullable) = false ];
  Attestation attestation = 2;
  bool inbound = 3;
  bool allow_future_observation =
      4; // allow future observation if this is an instant observation and gas
         // is wrong, requiring future observation to correct
}

message QuorumTx {
  option (gogoproto.stringer) = true;

  ObservedTx obsTx = 1 [ (gogoproto.nullable) = false ];
  repeated Attestation attestations = 2;
  bool inbound = 3;
  bool allow_future_observation =
      4; // allow future observation if this is an instant observation and gas
         // is wrong, requiring future observation to correct
}

message QuorumState {
  option (gogoproto.stringer) = true;

  repeated QuorumTx quoTxs = 1;
  repeated QuorumNetworkFee quoNetworkFees = 2;
  repeated QuorumSolvency quoSolvencies = 3;
  repeated QuorumErrataTx quoErrataTxs = 4;
  repeated QuorumPriceFeed quoPriceFeeds = 5;
}

message NetworkFee {
  option (gogoproto.stringer) = true;

  int64 height = 1;
  string chain = 2 [ (gogoproto.casttype) = "Chain" ];
  uint64 transaction_size = 3;
  uint64 transaction_rate = 4;
}

message AttestNetworkFee {
  option (gogoproto.stringer) = true;

  NetworkFee network_fee = 1;
  Attestation attestation = 2;
}

message QuorumNetworkFee {
  option (gogoproto.stringer) = true;

  NetworkFee network_fee = 1;
  repeated Attestation attestations = 2;
}

message Solvency {
  option (gogoproto.stringer) = true;

  string id = 1 [ (gogoproto.casttype) = "TxID" ];
  string chain = 2 [ (gogoproto.casttype) = "Chain" ];
  string pub_key = 3 [ (gogoproto.casttype) = "PubKey" ];
  repeated Coin coins = 4
      [ (gogoproto.castrepeated) = "Coins", (gogoproto.nullable) = false ];
  int64 height = 5;
}

message AttestSolvency {
  option (gogoproto.stringer) = true;

  Solvency solvency = 1;
  Attestation attestation = 2;
}

message QuorumSolvency {
  option (gogoproto.stringer) = true;

  Solvency solvency = 1;
  repeated Attestation attestations = 2;
}

message ErrataTx {
  option (gogoproto.stringer) = true;

  string id = 1 [ (gogoproto.casttype) = "TxID" ];
  string chain = 2 [ (gogoproto.casttype) = "Chain" ];
}

message AttestErrataTx {
  option (gogoproto.stringer) = true;

  ErrataTx errata_tx = 1;
  Attestation attestation = 2;
}

message QuorumErrataTx {
  option (gogoproto.stringer) = true;

  ErrataTx errata_tx = 1;
  repeated Attestation attestations = 2;
}

message PriceFeed {
  option (gogoproto.stringer) = true;
  // time of sending node in milliseconds, only used to check
  // which price feed is more recent
  bytes version = 1;
  int64 time = 2;
  repeated OraclePrice rates = 3;
}

message AttestPriceFeed {
  option (gogoproto.stringer) = true;

  PriceFeed price_feed = 1;
  Attestation attestation = 2;
}

message QuorumPriceFeed {
  option (gogoproto.stringer) = true;

  PriceFeed price_feed = 1;
  repeated Attestation attestations = 2;
}

message QuorumPriceFeedBatch {
  option (gogoproto.stringer) = true;

  repeated QuorumPriceFeed quorum_price_feeds = 1;
}

message OraclePrice {
  option (gogoproto.stringer) = true;

  uint64 amount = 1;
  uint32 decimals = 2;
}

message AttestationBatch {
  option (gogoproto.stringer) = true;

  repeated AttestTx attest_txs = 1;
  repeated AttestNetworkFee attest_network_fees = 2;
  repeated AttestSolvency attest_solvencies = 3;
  repeated AttestErrataTx attest_errata_txs = 4;
  repeated AttestPriceFeed attest_price_feeds = 5;
}
