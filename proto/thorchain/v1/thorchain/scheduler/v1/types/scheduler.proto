syntax = "proto3";
package thorchain.scheduler.v1;

import "gogoproto/gogo.proto";
import "thorchain/scheduler/v1/types/tx.proto";

option go_package = "gitlab.com/thorchain/thornode/v3/x/scheduler/types";

message Schedule {
  uint64 height = 1 [ (gogoproto.moretags) = "yaml:\"height\"" ];
  repeated MsgScheduleExecuteContract msgs = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"contracts\""
  ];
}