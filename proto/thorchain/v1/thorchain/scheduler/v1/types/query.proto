syntax = "proto3";
package thorchain.scheduler.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "thorchain/scheduler/v1/types/scheduler.proto";

option go_package = "gitlab.com/thorchain/thornode/v3/x/scheduler/types";

// Query defines the gRPC querier service.
service Query {
  rpc Schedule(QueryScheduleRequest) returns (QueryScheduleResponse) {
    option (google.api.http).get = "/schedule/{height}";
  }
  rpc Schedules(QuerySchedulesRequest) returns (QuerySchedulesResponse) {
    option (google.api.http).get = "/schedules";
  }
}

message QueryScheduleRequest {
  uint64 height = 1 [ (gogoproto.moretags) = "yaml:\"height\"" ];
}
message QueryScheduleResponse {
  Schedule schedule = 1 [ (gogoproto.moretags) = "yaml:\"schedule\"" ];
}

message QuerySchedulesRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"pagination\""
  ];
  string sender = 2 [ (gogoproto.moretags) = "yaml:\"sender\"" ];
}
message QuerySchedulesResponse {
  repeated Schedule schedules = 1
      [ (gogoproto.moretags) = "yaml:\"schedules\"" ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"pagination\""
  ];
}
