syntax = "proto3";
package types;

option go_package = "gitlab.com/thorchain/thornode/v3/x/thorchain/types";

import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "common/common.proto";

message MsgPriceFeedQuorum {
  option (amino.name) = "thorchain/MsgPriceFeedQuorum";

  common.QuorumPriceFeed quoPriceFeed = 1;
  bytes signer = 2 [
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.AccAddress",
    (amino.encoding) = "bech32"
  ];
}

message MsgPriceFeedQuorumBatch {
  option (amino.name) = "thorchain/MsgPriceFeedQuorumBatch";

  repeated common.QuorumPriceFeed quoPriceFeeds = 1;
  bytes signer = 2 [
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.AccAddress",
    (amino.encoding) = "bech32"
  ];
}