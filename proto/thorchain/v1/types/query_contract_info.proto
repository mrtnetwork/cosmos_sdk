syntax = "proto3";
package types;

option go_package = "gitlab.com/thorchain/thornode/v3/x/thorchain/types";

import "types/type_contract_info.proto";
import "gogoproto/gogo.proto";

option (gogoproto.marshaler_all) = true;

// query single contract info
message QueryContractInfoRequest {
  string height = 1;
  string address = 2;
}

message QueryContractInfoResponse { ContractInfo info = 1; }

// query all contract infos
message QueryContractInfosRequest {
  string height = 1;
  string contract = 2;
  string version = 3;
}

message QueryContractInfosResponse { repeated ContractInfo infos = 1; }